<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gullkhan Pro with Image</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    color: white;
    text-align: center;
}

.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}

.hero img {
    width: 300px;
    border-radius: 20px;
    box-shadow: 0 0 20px #00f6ff;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0px); }
}

h1 {
    font-size: 50px;
    margin: 20px 0 10px 0;
}

p {
    font-size: 20px;
    max-width: 600px;
}

.btn {
    margin-top: 20px;
    padding: 12px 30px;
    border-radius: 50px;
    background: linear-gradient(90deg,#00f6ff,#ff00ff);
    color: white;
    text-decoration: none;
    font-size: 18px;
    box-shadow: 0 0 15px #00f6ff;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px #ff00ff;
}
</style>
</head>
<body>

<section class="hero">
    <img src="images/hero-image.jpg" alt="Hero Image">
    <h1>Gullkhan Pro</h1>
    <p>This is a stylish website with images and CSS animations.</p>
    <a href="#features" class="btn">Explore Features</a>
</section>

<section id="features">
    <h2>Features</h2>
    <p>Responsive design, animated elements, and images loaded perfectly from folder.</p>
</section>

</body>
</html>
